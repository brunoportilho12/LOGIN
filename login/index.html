<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h1, initial-scale=1.0">
   <title>Login | Sistema</title>
    <link rel="stylesheet" href="/login/css/stylle.css">
</head>
<body>

    <main class="login-container">
        <form id="login-form" class="login-box">
            <h2>Bem-vindo</h2>
            <p>Entre com suas credenciais para acessar a plataforma.</p>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" id="btn-login">Entrar</button>

            <div class="footer-links">
                <a href="#">Esqueceu a senha?</a>
                <span>Não tem conta? <a href="#">Cadastre-se</a></span>
            </div>
        </form>
    </main>

    <script src="/login/js/scripty.js"></script>
</body>
</html>
